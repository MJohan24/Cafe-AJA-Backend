services:
  mysql:
    image: mysql:8.0
    container_name: cafeflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cafeflow
      MYSQL_USER: cafeflow
      MYSQL_PASSWORD: cafeflow123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: cafeflow_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: cafeflow
      DB_USERNAME: cafeflow
      DB_PASSWORD: cafeflow123
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_BASE_URL: https://app.sandbox.midtrans.com
    ports:
      - "8080:8080"

volumes:
  mysql_data:
