server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cafeflow}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      "[hibernate.format_sql]": true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
